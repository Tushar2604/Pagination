# Render Blueprint — backend API + PostgreSQL with auto-migrate and seed.
#
# Deploy: Render Dashboard → New → Blueprint → connect repo
# After deploy, copy the API URL into Vercel as BACKEND_URL.

databases:
  - name: codevector-db
    databaseName: products_db
    user: products_user
    plan: free
    region: oregon

services:
  - type: web
    name: codevector-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    # Migrate + seed at start (DATABASE_URL is available at runtime, not in preDeploy)
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: codevector-db
          property: connectionString
      - key: DEFAULT_PAGE_LIMIT
        value: "20"
      - key: MAX_PAGE_LIMIT
        value: "100"
      - key: SEED_COUNT
        value: "200000"
      - key: SEED_BATCH_SIZE
        value: "5000"
      - key: ALLOWED_ORIGINS
        sync: false
